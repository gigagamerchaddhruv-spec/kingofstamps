<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>King of Stamps | Online Showcase</title>
  <link rel="stylesheet" href="style.css">
  <!-- Secondary clean body text typography from Bunny Fonts CDN -->
  <link href="https://bunny.net" rel="stylesheet">
  <link rel="preconnect" href="https://snipcart.com">
  <link rel="preconnect" href="https://snipcart.com">

  <header>
    <!-- Top Left Aligned Brutalist Text Logo Module -->
    <div class="logo-container">
      <span class="logo-text">KING</span>
      <span class="logo-subtext">OF STAMPS</span>
      <div class="logo-badge">
        <div class="badge-inner">
          <span class="badge-core">1M</span>
          <span class="badge-rim">MINT</span>
        </div>
      </div>
    </div>

    <!-- Interface Control Elements -->
    <div class="controls">
      <button onclick="setFilter('all')">All</button>
      <button onclick="setFilter('individual')">Gems</button>
      <button onclick="setFilter('pack')">Packs</button>
      <button onclick="setFilter('random')">Mystery Bags</button>
      
      <!-- Minimalist Icon-Only Expanding Search Box -->
      <div class="search-box-wrapper">
        <span class="search-emoji">🔍</span>
        <input type="text" id="searchBar" placeholder="SEARCH..." oninput="filterCatalog()">
      </div>
    </div>
  </header>
  
  <main id="stamp-grid"></main>
